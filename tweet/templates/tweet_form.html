{% extends 'layout.html' %}

{% block title %}
    index
{% endblock %}

{% block content %}
    <h2 class="text-center mt-4">
        {% if form.instance.pk %}
            Edit Tweet
        {% else %}
            Create Tweet
        {% endif %}
    </h2>
    
    <form method="post" enctype="multipart/form-data" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class = "btn btn-warning" type="submit">Submit</button>
    </form>

    <a class='btn btn-primary' href="{% url 'tweet_list' %}">Back</a>

{% endblock %}
