{% extends "layout.html" %}

{% block title %}
    register
{% endblock %}

{% block content %}
    <h2 class="text-center mt-4"> Register form </h2>

    <form method='post'>
        {% csrf_token %}
        {{ form.as_p }}
        <button type='submit' class="btn btn-primary">Submit</button>
    </form>

    <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>

{% endblock %}
