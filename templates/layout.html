<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}{% endblock %}
    </title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-gray shadow-sm border-bottom">
  <div class="container">

    <a class="navbar-brand fw-bold fs-4" href="#">Tweet</a>
    {% comment %} Search Form {% endcomment %}
    <form class="d-flex" role="search" action = "{% url 'search' %}" method="POST">
      {% csrf_token %}
      {{search_form.text}}
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>

    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">

        <li class="nav-item">
          <a class="nav-link active" href="{% url 'tweet_list' %}">Tweet Home</a>
        </li>

        {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="nav-link btn btn-link text-danger" type="submit">Logout</button>
        </form>
        {% else %}
        <li class="nav-item">
          <a class="nav-link btn btn-link" href="{% url 'login' %}">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link btn btn-link" href="{% url 'register' %}">Register</a>
        </li>
        {% endif %}
      </ul>
    </div>
    
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Bootstrap JS (required for toggler & dropdown) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
